<div class="login-page">
  <div class="login-card">
    <div class="login-header">
      <h1 class="login-title">Investigator Agent</h1>
      <p class="login-subtitle">Sign in to continue</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="login-form">
      @if (errorMessage) {
        <div class="error-message" role="alert">{{ errorMessage }}</div>
      }

      <div class="form-group">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          autocomplete="username"
          placeholder="Enter your username"
          class="form-input"
          [class.input-error]="submitted && username?.invalid"
        />
        @if (submitted && username?.errors?.['required']) {
          <span class="field-error">Username is required</span>
        }
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="Enter your password"
          class="form-input"
          [class.input-error]="submitted && password?.invalid"
        />
        @if (submitted && password?.errors?.['required']) {
          <span class="field-error">Password is required</span>
        }
      </div>

      <button type="submit" class="btn-login">Sign in</button>
    </form>
  </div>
</div>
