<nav class="sidenav" [class.collapsed]="collapsed">
  <button type="button" class="sidenav-toggle" (click)="toggle()" [attr.aria-label]="collapsed ? 'Expand menu' : 'Collapse menu'">
    @if (collapsed) {
      <span class="toggle-icon">→</span>
    } @else {
      <span class="toggle-icon">←</span>
    }
  </button>
  <ul class="nav-list">
    <li>
      <a routerLink="/dashboard" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
        <span class="nav-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
          </svg>
        </span>
        <span class="nav-label">Dashboard</span>
      </a>
    </li>
    @if (auth.currentRole !== 'admin') {
      <li>
        <a routerLink="/applications" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
          <span class="nav-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/>
            </svg>
          </span>
          <span class="nav-label">New Application</span>
        </a>
      </li>
    }
  </ul>
</nav>
